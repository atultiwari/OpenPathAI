name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_SYSTEM_PYTHON: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  lint:
    name: Lint + type check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dev environment
        run: uv sync --extra dev --no-install-project && uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check src tests

      - name: Ruff (format check)
        run: uv run ruff format --check src tests

      - name: Pyright
        run: uv run pyright src

  test:
    name: Test · ${{ matrix.os }} · Python ${{ matrix.python }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
        python: ["3.11", "3.12"]
        include:
          - os: windows-latest
            python: "3.11"
            experimental: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python }}

      - name: Sync dev environment
        run: uv sync --extra dev

      - name: Run pytest
        run: uv run pytest -q

      - name: Smoke CLI — --version
        run: uv run openpathai --version

      - name: Smoke CLI — hello
        run: uv run openpathai hello

  docs-build:
    name: Docs build (mkdocs --strict)
    needs: lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dev environment
        run: uv sync --extra dev

      - name: Build docs
        run: uv run mkdocs build --strict
