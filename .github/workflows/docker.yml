# Phase 18 — build both Dockerfiles on push to main; push to
# GHCR only when a GHCR_TOKEN secret is configured (so forks +
# PRs build but don't push).
#
# Multi-platform (arm64) is out of scope for Phase 18 — amd64
# only. Adding arm64 later is a one-line `platforms:` change.

name: Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-cpu:
    name: Build CPU image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (only when token present)
        if: ${{ secrets.GHCR_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build (+ push when authenticated) — CPU
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.cpu
          push: ${{ secrets.GHCR_TOKEN != '' }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/atultiwari/openpathai:cpu-latest
            ghcr.io/atultiwari/openpathai:cpu-${{ steps.sha.outputs.short }}

  build-gpu:
    name: Build GPU image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (only when token present)
        if: ${{ secrets.GHCR_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build (+ push when authenticated) — GPU
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.gpu
          push: ${{ secrets.GHCR_TOKEN != '' }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/atultiwari/openpathai:gpu-latest
            ghcr.io/atultiwari/openpathai:gpu-${{ steps.sha.outputs.short }}
