name: resnet50
display_name: ResNet-50 (ImageNet1k)
family: resnet
task: classification
source:
  framework: timm
  identifier: resnet50
  license: Apache-2.0
num_params_m: 25.6
input_size: [224, 224]
channels: 3
preprocessing_mean: [0.485, 0.456, 0.406]
preprocessing_std: [0.229, 0.224, 0.225]
citation:
  text: "He et al., 'Deep Residual Learning for Image Recognition' (CVPR 2016)."
  arxiv: "1512.03385"
tier_compatibility:
  T1: slow
  T2: ok
  T3: ok
recommended_datasets: [lc25000, pcam, mhist]

training_data: >
  Weights pretrained on ImageNet-1k (ILSVRC 2012): ~1.28M natural images
  across 1000 object classes. OpenPathAI treats these as transfer-learning
  features — fine-tuning on labelled pathology tiles is the caller's
  responsibility.
intended_use: >
  Transfer-learning backbone for supervised tile classification in
  histopathology workflows. Fine-tune on labelled tiles with patient-level
  cross-validation and consume outputs as calibrated probabilities through
  OpenPathAI's borderline band.
out_of_scope_use: >
  Not a medical device. Not validated for stand-alone clinical
  decision-making. Not intended for whole-slide MIL, detection, or
  segmentation without task-specific retraining. Outputs must not be the
  sole basis for diagnostic or treatment decisions.
known_biases:
  - "Pretraining corpus (ImageNet-1k) is dominated by natural images; pathology staining, magnification, and scanner artefacts sit outside its native distribution."
  - "Performance depends heavily on fine-tuning data diversity; single-institution training tends to overfit scanner, stain, and cohort-specific features."
  - "Deeper than ResNet-18 but still purely convolutional; at high-resolution tiles (>= 512×512) it tends to trail transformer backbones on gland- and tissue-level context."

notes: >
  Standard deeper baseline. Pretrained ImageNet features transfer well
  to pathology tiles; trains comfortably on an 8 GB GPU at 224×224.
